name: 15-Minute Very Strong Signals

on:
  schedule:
    - cron: '0,15,30,45 9-14 * * 1-5'   # Every 15 minutes between 9:00 AM - 2:45 PM IST (Mon-Fri)
  workflow_dispatch:                    # Allows manual trigger

jobs:
  run-strong-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy python-telegram-bot==20.7 pytz

      - name: Run 15-Min Strong Signals Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python niftybot.py
